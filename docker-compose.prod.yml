services:
  api:
    restart: unless-stopped
    ports: !reset []
    volumes: !reset
      - media-data:/var/jonas/media
    command: ["sh", "-c", "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    env_file: .env
    depends_on:
      - api
      - langfuse
    networks:
      - jonas-network

  postgres:
    restart: unless-stopped
    ports: !reset []

  redis:
    restart: unless-stopped
    ports: !reset []

  qdrant:
    restart: unless-stopped
    ports: !reset []

  langfuse:
    restart: unless-stopped
    ports: !reset []
    environment:
      NEXTAUTH_URL: https://${LANGFUSE_DOMAIN}

volumes:
  caddy-data:
  caddy-config:
