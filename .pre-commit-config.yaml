repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: unit-tests
        name: unit tests
        entry: bash -c 'cd api && source .venv/bin/activate && python -m pytest tests/unit/ -q'
        language: system
        pass_filenames: false
        always_run: true
